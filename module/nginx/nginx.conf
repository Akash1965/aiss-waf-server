# ─────────────────────────────────────────────────────────────────────────────
# AISS WAF Gateway — Nginx Configuration
#
# Security standards:
#   • Singapore IM8 v5.0 §3 (Secure Channel & Encryption)
#   • MAS TRM 2021 §9.3 (Cryptography & Key Management)
#   • CSA Cyber Essentials Mark — Network Perimeter Protection
#   • NIST SP 800-52 Rev 2 (TLS guidelines for federal information systems)
#   • Japan CRYPTREC TR-02 (Recommended cipher suites)
#   • Korea K-ISMS Annex A §12 (Cryptographic controls)
#   • OWASP TLS Cheat Sheet (server-side TLS hardening)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes      auto;
worker_rlimit_nofile  65535;
error_log             /var/log/nginx/error.log warn;
pid                   /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security-hardened access log (ISO 27001 A.12.4 — logging) ─────────────
    log_format security_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referrer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"ssl_protocol":"$ssl_protocol",'
            '"ssl_cipher":"$ssl_cipher",'
            '"request_time":$request_time,'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"x_waf_verdict":"$upstream_http_x_waf_verdict"'
        '}';

    access_log /var/log/nginx/access.log security_json;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Suppress version leakage (IM8 §3.2 — Information Disclosure) ─────────
    server_tokens      off;

    # ── gzip (do not compress already-encrypted or binary content) ─────────
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript;
    gzip_vary          on;

    # ── Global SSL/TLS settings ────────────────────────────────────────────────
    # TLS 1.3 only (TLS 1.2 permitted as minimum per MAS TRM §9.3)
    # Disable SSLv3, TLS 1.0, TLS 1.1 — deprecated, vulnerable
    ssl_protocols              TLSv1.2 TLSv1.3;

    # Cipher suites — NIST SP 800-52 Rev 2 + CRYPTREC + OWASP recommended
    # TLS 1.3 suites are defined by the standard and cannot be configured;
    # these suites apply to TLS 1.2 fallback sessions only.
    ssl_ciphers  ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers  on;

    # ECDH curve — NIST P-384 preferred (FIPS 186-5; MAS TRM cryptographic standards)
    ssl_ecdh_curve             secp384r1:prime256v1;

    # Session caching (avoids repeated handshakes)
    ssl_session_cache          shared:SSL:50m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;   # disable session tickets (PFS risk)

    # OCSP Stapling — MAS TRM §9.3.3 (certificate validity checking)
    ssl_stapling               on;
    ssl_stapling_verify        on;
    resolver                   8.8.8.8 8.8.4.4 1.1.1.1 valid=300s ipv6=off;
    resolver_timeout           5s;

    # DH params — 2048-bit minimum (NIST SP 800-131A)
    # Generated via: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # MAS TRM §9.2 (DoS resilience), CSA Cyber Essentials
    limit_req_zone  $binary_remote_addr  zone=req_per_ip:20m   rate=30r/s;
    limit_req_zone  $binary_remote_addr  zone=login_zone:10m   rate=5r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

    # ── HTTP → HTTPS redirect (port 80) ───────────────────────────────────────
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Allow health check on HTTP (Docker healthcheck, load balancer probes)
        location = /health {
            return 200 '{"status":"ok","tls_redirect":"true"}';
            add_header Content-Type application/json;
        }

        # Redirect everything else to HTTPS permanently
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (port 443) ────────────────────────────────────────────────
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;
        server_name  _;

        # TLS certificate — ECDSA P-384 signed by AISS Root CA
        ssl_certificate      /etc/nginx/certs/nginx-chain.crt;
        ssl_certificate_key  /etc/nginx/certs/nginx.key;
        ssl_trusted_certificate /etc/nginx/certs/ca.crt;

        # ── Security headers (IM8 §3.5, OWASP Secure Headers Project) ─────────
        # HTTP Strict Transport Security — 2-year max-age (MAS TRM §9.3.2)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Clickjacking protection
        add_header X-Frame-Options "DENY" always;

        # MIME-type sniffing prevention
        add_header X-Content-Type-Options "nosniff" always;

        # XSS filter (legacy browsers)
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer Policy — limit referrer leakage
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions Policy — disable unused browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        # Remove information-leaking headers (set blank to suppress)
        add_header X-Powered-By "" always;
        add_header X-AspNet-Version "" always;

        # ── Rate limiting ──────────────────────────────────────────────────────
        limit_req       zone=req_per_ip burst=50 nodelay;
        limit_conn      conn_per_ip 50;
        limit_req_status 429;
        limit_conn_status 429;

        # ── Request size limits (prevent large-payload attacks) ────────────────
        client_max_body_size    10m;
        client_body_timeout     12s;
        client_header_timeout   12s;

        # ── Health check (bypass WAF) ──────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","tls":"TLS 1.3","gov_compliant":true}';
            add_header Content-Type application/json;
        }

        # ── All traffic through AISS WAF proxy ────────────────────────────────
        location / {
            # Rate-limit login endpoints more aggressively
            location ~* ^/(login|auth|signin|api/v1/auth) {
                limit_req  zone=login_zone burst=10 nodelay;
                proxy_pass http://waf-proxy:8888;
                include    /etc/nginx/proxy_params;
            }

            proxy_pass         http://waf-proxy:8888;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Port  $server_port;
            proxy_set_header   X-TLS-Version     $ssl_protocol;
            proxy_set_header   X-TLS-Cipher      $ssl_cipher;

            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;

            # Buffer settings
            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      8 16k;
        }
    }
}
